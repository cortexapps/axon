name: Build and Publish Docker Image

on: 
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      IS_DEFAULT_BRANCH: ${{ github.ref == format('refs/heads/{0}', 'main') }}
      IS_TAG: ${{ startsWith(github.ref, 'refs/tags/') }}
      IS_PUBLISH: ${{ github.event_name == 'workflow_dispatch' || github.ref == format('refs/heads/{0}', 'main') || startsWith(github.ref, 'refs/tags/') }}
      # ARM64 builds via QEMU are slow - only build on main/tags, not workflow_dispatch
      IS_ARM64_BUILD: ${{ github.ref == format('refs/heads/{0}', 'main') || startsWith(github.ref, 'refs/tags/') }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Cache Docker layers
        uses: actions/cache@v5
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      -   name: Docker meta
          id: meta
          uses: docker/metadata-action@v5
          with:
            images: |
              ghcr.io/${{ github.repository_owner }}/cortex-axon-agent
            tags: |
              type=ref,event=branch
              type=semver,pattern={{version}}
              type=semver,pattern={{major}}.{{minor}}
              type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          file: ./docker/Dockerfile
          push: ${{ env.IS_PUBLISH == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # arm64 via QEMU is slow, so only build it on main branch or tags (not workflow_dispatch)
          platforms: ${{ env.IS_ARM64_BUILD == 'true' && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache
          load: ${{ env.IS_PUBLISH != 'true' }}

      - name: Determine local image tag
        if: env.IS_PUBLISH != 'true'
        id: local-tag
        run: echo "tag=$(echo '${{ steps.meta.outputs.tags }}' | head -n1)" >> "$GITHUB_OUTPUT"

      - name: Save Docker image for scanning
        if: env.IS_PUBLISH != 'true'
        run: docker save '${{ steps.local-tag.outputs.tag }}' -o /tmp/docker-image.tar

      - name: Upload Docker image artifact
        if: env.IS_PUBLISH != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/docker-image.tar
          retention-days: 1

    outputs:
      image-tag: ${{ steps.local-tag.outputs.tag }}

  trivy-pr:
    name: Run Trivy PR scan (local image)
    needs: build
    if: ${{ !(github.event_name == 'workflow_dispatch' || github.ref == format('refs/heads/{0}', 'main') || startsWith(github.ref, 'refs/tags/')) }}
    runs-on: ubuntu-latest
    steps:
      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Load Docker image
        run: docker load -i /tmp/docker-image.tar

      - name: Run Trivy vulnerability scanner (SARIF)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ needs.build.outputs.image-tag }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          exit-code: '0'
          skip-dirs: 'usr/lib/node_modules/npm,usr/local/go'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4.32.2
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Fail on CRITICAL/HIGH vulnerabilities
        run: |
          COUNT=$(jq '[.runs[].results[]] | length' trivy-results.sarif)
          if [ "$COUNT" -gt 0 ]; then
            echo "::error::Found $COUNT CRITICAL/HIGH fixable vulnerabilities:"
            jq -r '.runs[].results[] | "\(.ruleId): \(.message.text | split("\n") | .[0])"' trivy-results.sarif
            exit 1
          fi

  trivy:
    name: Run Trivy Container scan
    needs: build
    if: ${{ github.event_name == 'workflow_dispatch' || github.ref == format('refs/heads/{0}', 'main') || startsWith(github.ref, 'refs/tags/') }}
    uses: ./.github/workflows/trivy.yml
    secrets: inherit
