services:
  snyk-broker:
    build:
      context: .
      dockerfile: Dockerfile.snyk-broker-server
    image: cortex-snyk-broker-server:local
    ports:
      # Expose HTTP for direct test script access (curl commands in relay_test.sh)
      - "${SERVER_PORT}:7341"
    volumes:
      - .:/src
    environment:
      ACCEPT: /src/accept-server.json
    networks:
      - external  # snyk-broker is on external network only

  # TLS proxy in front of snyk-broker (mimics production relay.cortex.io setup)
  # axon-relay connects here via proxy to test TLS-through-proxy scenario
  snyk-broker-tls:
    image: nginx:alpine
    # No external port needed - accessed internally via mitmproxy
    volumes:
      - ./nginx-tls-proxy.conf:/etc/nginx/nginx.conf:ro
      - ./.mitmproxy:/certs:ro
    depends_on:
      - snyk-broker
    networks:
      - external  # TLS proxy is on external network

  mitmproxy:
    image: mitmproxy/mitmproxy:12
    ports:
      - "9980:8080"
      - "9981:8081"
    volumes:
      - ./.mitmproxy:/home/mitmproxy/.mitmproxy
      - ./mitmproxy_addon_header.py:/home/mitmproxy/addon.py
    # Use combined CA bundle (system CAs + our mitmproxy CA for broker cert verification)
    command: mitmdump -s /home/mitmproxy/addon.py --set ssl_verify_upstream_trusted_ca=/home/mitmproxy/.mitmproxy/combined-ca-bundle.crt
    healthcheck:
      test: ["CMD", "python3", "-c", "import socket; s=socket.socket(); s.connect(('localhost', 8080)); s.close()"]
      interval: 2s
      timeout: 5s
      retries: 10
    networks:
      - internal  # mitmproxy bridges both networks
      - external

  axon-relay:
    build:
      context: ../../..
      dockerfile: docker/Dockerfile
    image: cortex-axon-agent:local
    volumes:
      - .:/src
      - ./.mitmproxy:/certs
      - ../../server/snykbroker/acceptfile:/agent/plugins
    environment:
      CORTEX_API_TOKEN: fake-token
      CORTEX_API_BASE_URL: http://cortex-fake:8081
      GITHUB_RAW_API: https://raw.githubusercontent.com
      PORT: 7433
      PLUGIN_DIRS: /agent/plugins
    env_file: ${ENVFILE:-noproxy.env}
    command: relay -f /src/accept-client.json -i github -a axon-test
    depends_on:
      mitmproxy:
        condition: service_healthy
      snyk-broker-tls:
        condition: service_started
      cortex-fake:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7433/healthcheck"]
      interval: 5s
      timeout: 5s
      retries: 6
    networks:
      - internal
      # For PROXY=1: this is the only network, forcing traffic through mitmproxy
      # For PROXY=0: docker-compose.noproxy.yml adds external network


  python-server:
    image: python:3.8-alpine
    volumes:
      - /tmp:/tmp
    command: sh -c "apk add curl && python3 -m http.server 80 -d /tmp"
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -f http://localhost:80/ || true"]  # just check server is up
      interval: 5s
      timeout: 5s
      retries: 6
    stop_grace_period: 1s  # SIGKILL after 1s
    networks:
      - internal  # python-server is a local customer service

  cortex-fake:
    image: golang:1.26.1-alpine
    volumes:
      - .:/src
    environment:
      PORT: 8081
      # Default: HTTP for non-proxy mode (direct connection)
      # Override in docker-compose.proxy.yml for HTTPS through proxy
      BROKER_SERVER_URL: http://snyk-broker:7341
      TOKEN: ${TOKEN:-0e481b34-76ac-481a-a92f-c94a6cf6f6c2}
    command: sh -c "apk add curl && cd /src && go run cortex-registration-fake.go"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/healthcheck"]
      interval: 1s
      timeout: 1s
      retries: 30
    networks:
      - internal  # cortex-fake is accessed by axon-relay for registration

networks:
  internal:
    # Internal network - axon-relay, python-server, cortex-fake
    # axon-relay can only reach external network via mitmproxy
  external:
    # External network - snyk-broker (mimics Cortex side)
